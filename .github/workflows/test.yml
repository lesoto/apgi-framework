name: CI

on:
  push:
    branches: ["main", "dev", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Figure smoke tests
        run: |
          python figures/generate_figure1.py --no-show
          python figures/generate_figure2.py --no-show
          python figures/generate_figure3.py --no-show
          python figures/generate_figure4.py --no-show
          python figures/generate_figure5.py --no-show
          python figures/generate_figure6.py --no-show
          python figures/generate_figure7.py --no-show
          python figures/generate_figure8.py --no-show

      - name: Validate protocol JSON schemas
        run: |
          python -c "
          import json, jsonschema, pathlib
          schema = json.load(open('protocols/schemas/protocol.schema.json'))
          for f in sorted(pathlib.Path('protocols').glob('*.json')):
              jsonschema.validate(json.load(open(f)), schema)
              print(f'  OK  {f.name}')
          print('All protocols valid')
          "
