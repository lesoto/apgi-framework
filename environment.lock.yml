# Locked conda environment for APGI Framework v0.2.0
#
# Generated from environment.yml with exact package versions for bit-for-bit
# reproducibility.  Regenerate after any dependency update:
#
#   conda env export --no-builds > environment.lock.yml   # active env
#   # or with conda-lock (cross-platform):
#   pip install conda-lock
#   conda-lock -f environment.yml -p linux-64 -p osx-arm64
#
# This file was exported on macOS arm64 (Darwin 25.5.0).
# For Linux x86-64 (e.g. HPC), regenerate with conda-lock as above.

name: apgi
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11.9
  - numpy=1.26.4
  - scipy=1.13.0
  - matplotlib=3.8.4
  - pytest=8.2.0
  - pytest-cov=5.0.0
  - jsonschema=4.23.0
  - nbformat=5.10.4
  - ipykernel=6.29.4
  - pip=24.0
  # indirect dependencies pinned for reproducibility
  - certifi=2024.2.2
  - packaging=24.0
  - pyparsing=3.1.2
  - python-dateutil=2.9.0
  - pytz=2024.1
  - six=1.16.0
  - pip:
      - nbval==0.10.0
      - ruff==0.4.5
      - mypy==1.10.0
      - -e .
